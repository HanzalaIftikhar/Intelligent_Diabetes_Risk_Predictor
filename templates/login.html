<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 450px; }
        h1 { color: #2E4057; text-align: center; margin-bottom: 8px; }
        p { text-align: center; color: #666; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        input:focus { outline: none; border-color: #2E4057; }
        button { width: 100%; padding: 12px; background: #2E4057; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #1a2d3d; }
        .link { text-align: center; margin-top: 16px; font-size: 14px; color: #666; }
        .link a { color: #2E4057; text-decoration: none; font-weight: bold; }
        .alert { padding: 10px; border-radius: 6px; margin-bottom: 16px; text-align: center; background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        .flash-message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            border-left: 4px solid;
        }
        .flash-success { background: #d4edda; color: #155724; border-color: #28a745; }
        .flash-error   { background: #f8d7da; color: #721c24; border-color: #dc3545; }
        .flash-warning { background: #fff3cd; color: #856404; border-color: #ffc107; }
        @media (max-width: 500px) {
            .container {
                width: 95%;
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 Login</h1>
        <p>Welcome back — please login</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="flash-message flash-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="e.g. ali@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div class="link">Don't have an account? <a href="/register">Register</a></div>
    </div>
</body>
</html>
